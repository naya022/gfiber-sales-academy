<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFiber Sales Academy | Ready to Sell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --g-blue:#4285F4; --g-red:#EA4335; --g-yellow:#FBBC04; --g-green:#34A853;
  --ink:#202124; --ink-soft:#5F6368; --paper:#FFFFFF; --mist:#F1F3F4; --sky:#E8F0FE;
  --radius:16px; --shadow:0 2px 12px rgba(32,33,36,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Roboto',Arial,sans-serif;color:var(--ink);background:var(--mist);line-height:1.55;}
h1,h2,h3,h4,.display{font-family:'Outfit','Roboto',sans-serif;}
button{font-family:'Outfit','Roboto',sans-serif;cursor:pointer;border:none;}

/* ---------- Fiber progress strand (signature element) ---------- */
.fiberbar{position:fixed;top:0;left:0;right:0;height:6px;background:#DADCE0;z-index:60;}
.fiberbar .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--g-blue),var(--g-green));transition:width .6s ease;position:relative;}
.fiberbar .pulse{position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle,#fff 0 30%,var(--g-blue) 70%);box-shadow:0 0 10px 3px rgba(66,133,244,.7);animation:glow 1.4s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 8px 2px rgba(66,133,244,.55)}50%{box-shadow:0 0 16px 6px rgba(66,133,244,.85)}}

/* ---------- Layout ---------- */
.app{display:flex;min-height:100vh;padding-top:6px;}
.side{width:280px;background:var(--paper);border-right:1px solid #DADCE0;padding:22px 16px;position:sticky;top:6px;height:calc(100vh - 6px);overflow-y:auto;flex-shrink:0;}
.main{flex:1;padding:34px clamp(16px,4vw,56px);max-width:1000px;margin:0 auto;}
.wordmark{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.wordmark .dots{display:flex;gap:3px;}
.wordmark .dots span{width:9px;height:9px;border-radius:50%;}
.wordmark .dots span:nth-child(1){background:var(--g-blue)}
.wordmark .dots span:nth-child(2){background:var(--g-red)}
.wordmark .dots span:nth-child(3){background:var(--g-yellow)}
.wordmark .dots span:nth-child(4){background:var(--g-green)}
.wordmark b{font-family:'Outfit';font-size:24px;font-weight:700;letter-spacing:-.5px;}
.side .tag{font-size:12px;color:var(--ink-soft);margin-bottom:20px;display:block;}
.navmod{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;padding:11px 10px;border-radius:10px;font-size:14px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;}
.navmod:hover{background:var(--mist)}
.navmod.active{background:var(--sky);color:var(--g-blue);}
.navmod.done .dot{background:var(--g-green);color:#fff;}
.navmod .dot{width:24px;height:24px;border-radius:50%;background:#DADCE0;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;}
.navmod.active .dot{background:var(--g-blue);color:#fff;}
.navmod.locked{opacity:.45;cursor:not-allowed;}
.menu-toggle{display:none;}

/* ---------- Slides ---------- */
.slide{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(24px,4vw,44px);animation:rise .45s ease;}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--g-blue);margin-bottom:8px;font-family:'Outfit';}
.slide h2{font-size:clamp(24px,3.4vw,34px);font-weight:800;letter-spacing:-.5px;margin-bottom:14px;}
.slide p{color:var(--ink-soft);margin-bottom:14px;max-width:64ch;}
.slide p b, .slide li b{color:var(--ink);}
.slide ul{margin:0 0 14px 20px;color:var(--ink-soft);}
.slide li{margin-bottom:8px;}
.controls{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px;}
.btn{padding:12px 26px;border-radius:999px;font-size:15px;font-weight:700;transition:transform .12s ease, box-shadow .12s ease;}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--g-blue);color:#fff;box-shadow:0 3px 10px rgba(66,133,244,.35);}
.btn.primary:disabled{background:#BDC1C6;box-shadow:none;cursor:not-allowed;}
.btn.ghost{background:var(--mist);color:var(--ink);}
.crumb{font-size:13px;color:var(--ink-soft);font-weight:600;}

/* ---------- Hero ---------- */
.hero{text-align:center;padding:clamp(30px,6vw,60px) 20px;}
.hero h1{font-size:clamp(34px,6vw,58px);font-weight:800;letter-spacing:-1.5px;line-height:1.08;margin:18px 0 12px;}
.hero h1 .hl{background:linear-gradient(90deg,var(--g-blue),var(--g-green));-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero .sub{font-size:clamp(15px,2vw,18px);color:var(--ink-soft);max-width:54ch;margin:0 auto 26px;}
.daymap{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:26px 0 30px;}
.daypill{background:var(--paper);border:2px solid var(--mist);border-radius:14px;padding:12px 16px;font-size:13px;font-weight:600;color:var(--ink-soft);width:138px;}
.daypill b{display:block;font-family:'Outfit';font-size:15px;color:var(--ink);margin-bottom:2px;}
.daypill:nth-child(1){border-top:4px solid var(--g-blue)}
.daypill:nth-child(2){border-top:4px solid var(--g-red)}
.daypill:nth-child(3){border-top:4px solid var(--g-yellow)}
.daypill:nth-child(4){border-top:4px solid var(--g-green)}
.daypill:nth-child(5){border-top:4px solid var(--g-blue)}

/* ---------- Gigi the mascot ---------- */
.gigi{display:inline-block;animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.gigi .arm-wave{transform-origin:38px 66px;animation:wave 2.2s ease-in-out infinite;}
@keyframes wave{0%,55%,100%{transform:rotate(0)}65%{transform:rotate(-26deg)}75%{transform:rotate(10deg)}85%{transform:rotate(-22deg)}}
.gigi .eye{animation:blink 4.4s infinite;}
@keyframes blink{0%,94%,100%{transform:scaleY(1)}97%{transform:scaleY(.08)}}
.speech{display:flex;align-items:flex-end;gap:14px;margin:18px 0;}
.speech .bubble{background:var(--sky);border-radius:18px 18px 18px 4px;padding:14px 18px;font-size:15px;color:var(--ink);max-width:52ch;text-align:left;}
.speech .bubble b{color:var(--g-blue)}

/* ---------- Cards / games ---------- */
.cardgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin:18px 0;}
.flip{perspective:900px;cursor:pointer;height:150px;}
.flip .inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
.flip.flipped .inner{transform:rotateY(180deg);}
.flip .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;font-weight:600;font-size:14px;}
.flip .front{background:var(--paper);border:2px solid #DADCE0;color:var(--ink);}
.flip .back{transform:rotateY(180deg);color:#fff;font-size:13px;font-weight:500;line-height:1.4;}
.flip .back.fact{background:var(--g-green);} .flip .back.myth{background:var(--g-red);}
.flip .face .lbl{font-family:'Outfit';font-weight:800;font-size:15px;margin-bottom:6px;display:block;}

.planrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:18px 0;}
.plan{border:2px solid #DADCE0;border-radius:16px;padding:20px;background:var(--paper);transition:transform .15s;}
.plan:hover{transform:translateY(-4px);}
.plan h3{font-size:20px;margin-bottom:2px;}
.plan .speed{font-family:'Outfit';font-weight:800;font-size:30px;letter-spacing:-1px;}
.plan ul{margin:10px 0 0 18px;font-size:13.5px;}
.plan.core{border-top:6px solid var(--g-blue)} .plan.home{border-top:6px solid var(--g-yellow)} .plan.edge{border-top:6px solid var(--g-green)}
.plan .fit{margin-top:10px;font-size:12.5px;background:var(--mist);border-radius:8px;padding:8px 10px;color:var(--ink-soft);}

.matchwrap{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:18px 0;}
.matchcol h4{font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:10px;}
.mitem{border:2px solid #DADCE0;background:var(--paper);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:14px;cursor:pointer;width:100%;text-align:left;font-family:'Roboto';transition:border-color .15s;}
.mitem.sel{border-color:var(--g-blue);background:var(--sky);}
.mitem.ok{border-color:var(--g-green);background:#E6F4EA;cursor:default;}
.mitem.bad{animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.mitem b{font-family:'Outfit';display:block;}

.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;}
.tab{padding:10px 18px;border-radius:999px;background:var(--mist);font-weight:700;font-size:14px;color:var(--ink-soft);}
.tab.active.res{background:var(--g-blue);color:#fff;}
.tab.active.mdu{background:var(--g-green);color:#fff;}
.tab.active.biz{background:var(--g-yellow);color:var(--ink);}
.chpanel{border:2px solid var(--mist);border-radius:16px;padding:22px;animation:rise .3s ease;}
.chpanel h3{margin-bottom:8px;}
.twocol{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:14px;}
.dolist,.dontlist{border-radius:12px;padding:14px 16px;font-size:14px;}
.dolist{background:#E6F4EA;} .dontlist{background:#FCE8E6;}
.dolist h5{color:var(--g-green);margin-bottom:6px;} .dontlist h5{color:var(--g-red);margin-bottom:6px;}
.dolist ul,.dontlist ul{margin-left:18px;color:var(--ink);}

/* ---------- Scenario ---------- */
.scene{display:flex;gap:20px;align-items:flex-start;margin:18px 0;flex-wrap:wrap;}
.scene .avatarbox{flex-shrink:0;text-align:center;font-size:13px;font-weight:700;color:var(--ink-soft);}
.scene .convo{flex:1;min-width:260px;}
.cust-line{background:var(--mist);border-radius:16px 16px 16px 4px;padding:14px 16px;font-size:15px;margin-bottom:14px;}
.choice{display:block;width:100%;text-align:left;border:2px solid #DADCE0;background:var(--paper);border-radius:12px;padding:13px 15px;font-size:14px;margin-bottom:10px;font-family:'Roboto';transition:border-color .15s;}
.choice:hover{border-color:var(--g-blue);}
.feedback{border-radius:12px;padding:13px 15px;font-size:14px;margin:10px 0;animation:rise .3s;}
.feedback.good{background:#E6F4EA;border-left:4px solid var(--g-green);}
.feedback.bad{background:#FCE8E6;border-left:4px solid var(--g-red);}
.moodwrap{margin-bottom:14px;}
.moodwrap .lbl{font-size:12px;font-weight:700;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase;}
.moodbar{height:10px;background:#DADCE0;border-radius:999px;overflow:hidden;margin-top:5px;}
.moodbar .mfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--g-red),var(--g-yellow),var(--g-green));transition:width .5s;}
.avatar .mouth{transition:d .3s;}

/* ---------- Checklist ---------- */
.check{display:flex;align-items:flex-start;gap:12px;border:2px solid var(--mist);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;background:var(--paper);width:100%;text-align:left;font-family:'Roboto';}
.check .box{width:22px;height:22px;border:2px solid #BDC1C6;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;margin-top:2px;}
.check.on{border-color:var(--g-green);background:#F4FBF6;}
.check.on .box{background:var(--g-green);border-color:var(--g-green);}
.check .t b{font-family:'Outfit';display:block;font-size:14.5px;}
.check .t span{font-size:13px;color:var(--ink-soft);}

/* ---------- Quiz ---------- */
.qcard{margin-bottom:8px;}
.qnum{font-size:12px;font-weight:800;color:var(--g-blue);letter-spacing:.1em;font-family:'Outfit';}
.qtext{font-size:17px;font-weight:700;font-family:'Outfit';margin:6px 0 14px;}
.qopt{display:block;width:100%;text-align:left;border:2px solid #DADCE0;background:var(--paper);border-radius:12px;padding:13px 15px;font-size:14.5px;margin-bottom:10px;font-family:'Roboto';}
.qopt:hover{border-color:var(--g-blue);}
.qopt.right{border-color:var(--g-green);background:#E6F4EA;}
.qopt.wrong{border-color:var(--g-red);background:#FCE8E6;}
.qbar{display:flex;gap:5px;margin-bottom:18px;}
.qbar i{flex:1;height:6px;border-radius:99px;background:#DADCE0;}
.qbar i.hit{background:var(--g-green);} .qbar i.miss{background:var(--g-red);} .qbar i.cur{background:var(--g-blue);}

/* ---------- Badge / confetti ---------- */
.badgewrap{text-align:center;padding:24px 0;}
.badge{width:190px;height:190px;margin:0 auto 18px;position:relative;animation:pop .6s cubic-bezier(.2,1.6,.4,1);}
@keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.score-big{font-family:'Outfit';font-weight:800;font-size:46px;letter-spacing:-2px;}
.confetti{position:fixed;top:-12px;border-radius:3px;width:10px;height:14px;z-index:99;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(105vh) rotate(640deg);opacity:.2}}

.note{font-size:12px;color:var(--ink-soft);text-align:center;padding:20px;}
.statline{display:flex;gap:14px;flex-wrap:wrap;margin:16px 0;}
.stat{background:var(--mist);border-radius:12px;padding:12px 18px;font-size:13px;color:var(--ink-soft);}
.stat b{font-family:'Outfit';font-size:20px;color:var(--ink);display:block;}

@media(max-width:880px){
  .side{position:fixed;left:-300px;transition:left .25s;z-index:70;box-shadow:0 0 30px rgba(0,0,0,.18);}
  .side.open{left:0;}
  .menu-toggle{display:flex;position:fixed;bottom:18px;left:18px;z-index:80;background:var(--ink);color:#fff;border-radius:999px;padding:13px 20px;font-weight:700;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.3);align-items:center;gap:8px;}
  .matchwrap{grid-template-columns:1fr;}
  .main{padding:22px 14px 90px;}
}
</style>
</head>
<body>
<div class="fiberbar"><div class="fill" id="fiberfill"><div class="pulse"></div></div></div>

<div class="app">
  <nav class="side" id="sidenav">
    <div class="wordmark"><span class="dots"><span></span><span></span><span></span><span></span></span><b>GFiber</b></div>
    <span class="tag">Sales Academy &middot; Ready to Sell</span>
    <div id="navlist"></div>
  </nav>
  <main class="main" id="stage"></main>
</div>
<button class="menu-toggle" id="menubtn">&#9776; Modules</button>

<script>
/* ============================================================
   GFiber Sales Academy: "Ready to Sell" New Hire Onboarding
   Demo training concept by Naya Roquemore (not an official GFiber product)
   ============================================================ */

// ---------- SVG characters ----------
function gigiSVG(size, line){
  return `<div class="gigi"><svg width="${size}" height="${size}" viewBox="0 0 110 110" role="img" aria-label="Gigi the GFiber mascot">
    <path d="M55 8 C30 8 18 28 18 50 C18 76 34 96 55 102 C76 96 92 76 92 50 C92 28 80 8 55 8 Z" fill="#4285F4"/>
    <path d="M55 14 C34 14 24 31 24 50 C24 72 38 90 55 95 C72 90 86 72 86 50 C86 31 76 14 55 14 Z" fill="#5A95F5"/>
    <polyline points="30,58 44,50 52,62 64,46 80,54" fill="none" stroke="#FBBC04" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g class="eye"><circle cx="42" cy="36" r="6.5" fill="#fff"/><circle cx="43.5" cy="37" r="3" fill="#202124"/></g>
    <g class="eye"><circle cx="68" cy="36" r="6.5" fill="#fff"/><circle cx="69.5" cy="37" r="3" fill="#202124"/></g>
    <path d="M46 72 Q55 80 64 72" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <g class="arm-wave"><path d="M38 66 Q20 60 14 44" fill="none" stroke="#4285F4" stroke-width="9" stroke-linecap="round"/><circle cx="13" cy="42" r="7" fill="#FBBC04"/></g>
    <path d="M74 68 Q88 74 92 86" fill="none" stroke="#4285F4" stroke-width="9" stroke-linecap="round"/>
    ${line?'':''}
  </svg></div>`;
}
function gigiSays(text){
  return `<div class="speech">${gigiSVG(86)}<div class="bubble">${text}</div></div>`;
}
// Customer avatar with mood (0 upset .. 2 happy)
function avatarSVG(mood, color){
  const mouths=["M40 72 Q52 64 64 72","M40 71 L64 71","M40 68 Q52 78 64 68"];
  const brows = mood===0 ? '<path d="M34 36 L46 40" stroke="#202124" stroke-width="3" stroke-linecap="round"/><path d="M70 36 L58 40" stroke="#202124" stroke-width="3" stroke-linecap="round"/>' : '';
  return `<svg class="avatar" width="96" height="96" viewBox="0 0 104 104" role="img" aria-label="Customer">
    <circle cx="52" cy="52" r="48" fill="${color}"/>
    <circle cx="52" cy="44" r="26" fill="#F8D8C0"/>
    <path d="M28 42 C28 24 40 16 52 16 C64 16 76 24 76 42 L72 40 C70 28 62 24 52 24 C42 24 34 28 30 40 Z" fill="#3B2B20"/>
    <g class="eye"><circle cx="44" cy="46" r="3.4" fill="#202124"/></g>
    <g class="eye"><circle cx="60" cy="46" r="3.4" fill="#202124"/></g>
    ${brows}
    <path class="mouth" d="${mouths[mood]}" transform="translate(0,-6) scale(.8) translate(12,14)" fill="none" stroke="#9C4A2F" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M22 100 C26 80 38 74 52 74 C66 74 78 80 82 100 Z" fill="#34A853"/>
  </svg>`;
}

// ---------- App state (in-memory) ----------
const S = { mod:0, slide:0, completed:[], quiz:{i:0,score:0,answers:[]}, mood:1, scStep:0, scDone:false };

// ---------- Module + slide content ----------
const MODULES = [
 {short:"Welcome", title:"Welcome to GFiber", slides:[
  {type:"hero"},
  {type:"content", eyebrow:"Module 1 · Who we are", h:"An Alphabet company on a mission", body:`
    ${gigiSays("Hi, I'm <b>Gigi</b>, your guide through the Academy. I'm a gig of pure fiber light, and I move fast. Try to keep up!")}
    <p><b>GFiber</b> is an Alphabet company that brings Google Fiber and Google Fiber Webpass internet to homes and businesses across the United States. We launched in 2012 in Kansas City to prove what communities could do with truly fast internet, and we've been expanding to new cities ever since.</p>
    <p>Our personality in three words: <b>fast, easy, and always looking ahead.</b> Everything you say to a customer should sound like those three words.</p>
    <ul>
      <li><b>Fast:</b> symmetrical multi-gig speeds on a fiber-to-the-home network.</li>
      <li><b>Easy:</b> no contracts, no data caps, no hidden equipment or install fees.</li>
      <li><b>Ahead:</b> the network keeps getting upgraded so customers never have to think about it.</li>
    </ul>`},
  {type:"content", eyebrow:"Module 1 · Fiber 101", h:"Why fiber beats the alternatives", body:`
    <p>You will hear "internet is internet" at doors and in lobbies. It isn't, and here's the 20-second version you'll use constantly:</p>
    <ul>
      <li><b>Fiber sends data as light through glass.</b> Cable sends electrical signals through copper that was originally built for TV. Light travels farther, faster, and without the interference copper picks up.</li>
      <li><b>Fiber is symmetrical.</b> Upload speed matches download speed. Cable uploads are typically a small fraction of the download number on the ad. That matters for video calls, cloud backups, gaming, and anyone working from home.</li>
      <li><b>Fiber holds up at peak hours.</b> Less neighborhood congestion at 7 pm, when everyone is streaming.</li>
    </ul>
    ${gigiSays("Memory hook: <b>light through glass, same speed both ways.</b> If you remember nothing else from today, remember that.")}`},
  {type:"mythfact"},
 ]},
 {short:"Product", title:"Know the Product", slides:[
  {type:"content", eyebrow:"Module 2 · The lineup", h:"Three plans, one promise", body:`
    <p>Every GFiber plan is symmetrical, has no data caps, no annual contracts, and includes equipment and professional installation. The base gigabit price hasn't changed since 2012, and customers love hearing that. Here's the lineup:</p>
    <div class="planrow">
      <div class="plan core"><h3>Core</h3><div class="speed">1 Gig</div>
        <ul><li>Wi-Fi 6E router included, plus a mesh extender if needed</li><li>Effortless, premium gigabit internet</li></ul>
        <div class="fit"><b>Fits:</b> streamers, browsers, everyday households</div></div>
      <div class="plan home"><h3>Home</h3><div class="speed">3 Gig</div>
        <ul><li>Wi-Fi 7 router included, plus extenders as needed</li><li>In-home consult and hard wiring of high-use areas where eligible</li></ul>
        <div class="fit"><b>Fits:</b> busy households working, learning, and gaming at once</div></div>
      <div class="plan edge"><h3>Edge</h3><div class="speed">8 Gig</div>
        <ul><li>Wi-Fi 7 router with 10G port, extenders as needed</li><li>Battery backup for up to 2 hours of power loss</li></ul>
        <div class="fit"><b>Fits:</b> creators, power users, smart-home maximalists</div></div>
    </div>
    <p style="font-size:13px">Always confirm current pricing and availability in your market tools before quoting a customer.</p>`},
  {type:"content", eyebrow:"Module 2 · The promise", h:"What every customer gets", body:`
    <ul>
      <li><b>No annual contracts.</b> Customers stay because they want to.</li>
      <li><b>No data caps.</b> Stream, upload, and back up without watching a meter.</li>
      <li><b>Equipment and installation included.</b> No surprise fees on the first bill.</li>
      <li><b>Reliability we stand behind.</b> 99.9%+ uptime, with a 25% refund on the month's bill if service is down for more than 45 minutes.</li>
      <li><b>Consistent pricing.</b> New and existing customers pay the same. No promo cliffs.</li>

const stage=document.getElementById('stage');
const navlist=document.getElementById('navlist');

function pct(){
  const totalSlides=MODULES.reduce((n,m)=>n+m.slides.length,0);
  let done=0;
  for(let i=0;i<S.mod;i++)done+=MODULES[i].slides.length;
  done+=S.slide;
  return Math.min(100,Math.round(done/totalSlides*100));
}
function renderNav(){
  navlist.innerHTML=MODULES.map((m,i)=>{
    const locked=i>0 && !S.completed.includes(i-1) && i!==S.mod;
    const cls=['navmod', i===S.mod?'active':'', S.completed.includes(i)?'done':'', locked?'locked':''].join(' ');
    const dot=S.completed.includes(i)?'\u2713':(i+1);
    return `<button class="${cls}" onclick="goMod(${i})">
      <span class="dot">${dot}</span><span>${m.title}</span></button>`;
  }).join('');
  document.getElementById('fiberfill').style.width=pct()+'%';
}
function goMod(i){
  const locked=i>0 && !S.completed.includes(i-1) && i!==S.mod;
  if(locked){return;}
  S.mod=i;S.slide=0;render();
  document.getElementById('sidenav').classList.remove('open');
}
function next(){
  const m=MODULES[S.mod];
  if(S.slide < m.slides.length-1){S.slide++;}
  else{
    if(!S.completed.includes(S.mod))S.completed.push(S.mod);
    if(S.mod<MODULES.length-1){S.mod++;S.slide=0;}
  }
  render(); window.scrollTo({top:0,behavior:'smooth'});
}
function back(){
  if(S.slide>0){S.slide--;}
  else if(S.mod>0){S.mod--;S.slide=MODULES[S.mod].slides.length-1;}
  render(); window.scrollTo({top:0,behavior:'smooth'});
}
function controls(nextLabel, disabled){
  const first=S.mod===0&&S.slide===0;
  return `<div class="controls">
    <button class="btn ghost" onclick="back()" ${first?'style="visibility:hidden"':''}>Back</button>
    <span class="crumb">Module ${S.mod+1} of ${MODULES.length}</span>
    <button class="btn primary" id="nextbtn" onclick="next()" ${disabled?'disabled':''}>${nextLabel||'Continue'}</button>
  </div>`;
}

function render(){
  renderNav();
  const sl=MODULES[S.mod].slides[S.slide];
  const fn={hero:rHero,content:rContent,mythfact:rMyth,match:rMatch,channels:rChannels,flash:rFlash,scenario:rScenario,checklist:rChecklist,quizintro:rQuizIntro,quiz:rQuiz}[sl.type];
  stage.innerHTML=fn(sl)+`<p class="note">Demo training concept designed by Naya Roquemore for the GFiber Sales Academy L&amp;D Specialist application. Not an official GFiber product.</p>`;
}

  <h2>Six habits of a clean sale</h2>
  <p>Tap each habit to commit to it. All six to continue. This is the checklist your future self (and your commission statement) will thank you for.</p>
  ${CHECKS.map((c,i)=>`<button class="check" id="ck${i}" onclick="tapCk(${i})">
    <span class="box" id="ckb${i}"></span><span class="t"><b>${c.t}</b><span>${c.d}</span></span></button>`).join('')}
  ${controls('Finish Module 5', true)}</div>`;
}
function tapCk(i){
  const el=document.getElementById('ck'+i);
  if(ckOn.has(i)){ckOn.delete(i);el.classList.remove('on');document.getElementById('ckb'+i).textContent='';}
  else{ckOn.add(i);el.classList.add('on');document.getElementById('ckb'+i).textContent='\u2713';}
  document.getElementById('nextbtn').disabled=ckOn.size!==CHECKS.length;
}

// Quiz
function rQuizIntro(){
  return `<div class="slide" style="text-align:center">
    <div class="eyebrow">Module 6 · Certification</div>
    <h2>The Ready to Sell certification</h2>
    ${gigiSays("Fifteen questions covering everything from fiber 101 to the close. You need <b>80% (12 of 15)</b> to earn your badge. You've got this.")}
    <div class="statline" style="justify-content:center">
      <div class="stat"><b>15</b>questions</div>
      <div class="stat"><b>80%</b>to pass</div>
      <div class="stat"><b>&infin;</b>retakes</div>
    </div>
    <button class="btn primary" onclick="startQuiz()" style="font-size:16px;padding:14px 34px;margin-top:10px">Begin certification</button>
    <div class="controls"><button class="btn ghost" onclick="back()">Back</button><span></span><span></span></div>
  </div>`;
}
function startQuiz(){S.quiz={i:0,score:0,answers:[]};S.slide=1;render();}
function rQuiz(){
  if(S.quiz.i>=QUIZ.length)return rResult();
  const q=QUIZ[S.quiz.i];
  return `<div class="slide">
    <div class="qbar">${QUIZ.map((_,i)=>{
      if(i<S.quiz.i)return `<i class="${S.quiz.answers[i]?'hit':'miss'}"></i>`;
      return `<i class="${i===S.quiz.i?'cur':''}"></i>`;}).join('')}</div>
    <div class="qcard">
      <div class="qnum">QUESTION ${S.quiz.i+1} OF ${QUIZ.length}</div>
      <div class="qtext">${q.q}</div>
      ${q.o.map((o,i)=>`<button class="qopt" id="q${i}" onclick="answer(${i})">${o}</button>`).join('')}
      <div id="qfb"></div>
    </div></div>`;
}
function answer(i){
  const q=QUIZ[S.quiz.i], right=i===q.a;
  S.quiz.answers.push(right); if(right)S.quiz.score++;
  document.querySelectorAll('.qopt').forEach((b,j)=>{
    b.disabled=true;
    if(j===q.a)b.classList.add('right');
    else if(j===i)b.classList.add('wrong');
  });
  document.getElementById('qfb').innerHTML=`<div class="feedback ${right?'good':'bad'}">${right?'Correct.':'Not quite. The highlighted answer is the one to remember.'}</div>
    <button class="btn primary" onclick="S.quiz.i++;render();window.scrollTo({top:0,behavior:'smooth'})">${S.quiz.i<QUIZ.length-1?'Next question':'See my results'}</button>`;
}
function rResult(){
  const score=S.quiz.score, pctScore=Math.round(score/QUIZ.length*100), passed=pctScore>=80;
  if(passed){
    if(!S.completed.includes(S.mod))S.completed.push(S.mod);
    setTimeout(confetti,150);
  }
  renderNav();
  return `<div class="slide badgewrap">
    ${passed?`
    <div class="badge"><svg viewBox="0 0 200 200" width="190" height="190">
      <circle cx="100" cy="100" r="92" fill="#4285F4"/>
      <circle cx="100" cy="100" r="78" fill="#fff"/>
      <circle cx="100" cy="100" r="70" fill="#E8F0FE"/>
      <polyline points="48,108 78,90 96,116 124,80 152,98" fill="none" stroke="#FBBC04" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M70 138 L94 158 L134 118" fill="none" stroke="#34A853" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="100" y="52" text-anchor="middle" font-family="Outfit,sans-serif" font-weight="800" font-size="15" fill="#202124">READY TO SELL</text>
    </svg></div>
    <h2>Certified. Welcome to the floor.</h2>
    <div class="score-big">${score}/${QUIZ.length} &middot; ${pctScore}%</div>
    <p style="margin:14px auto;max-width:54ch">You've completed the GFiber Sales Academy onboarding path. Your 30-day ramp starts now: shadow a senior rep this week, run your first solo doors with your team lead nearby, and bring every weird objection you hear back to the Academy. We'll keep sharpening together.</p>
    `:`
    ${gigiSays("So close! You scored <b>"+pctScore+"%</b> and the bar is 80%. Review the modules that tripped you up and run it back. Every great rep certifies; some just take the scenic route.")}
    <div class="score-big">${score}/${QUIZ.length} &middot; ${pctScore}%</div>
    `}
    <div style="margin-top:18px">
      <button class="btn primary" onclick="startQuiz()">${passed?'Retake for fun':'Retake the certification'}</button>
      <button class="btn ghost" onclick="goMod(0)" style="margin-left:8px">Back to start</button>
    </div>
  </div>`;
}
function confetti(){
  const colors=['#4285F4','#EA4335','#FBBC04','#34A853'];
  for(let i=0;i<90;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%4];
    c.style.animationDuration=(2.2+Math.random()*1.8)+'s';
    c.style.animationDelay=(Math.random()*.7)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5200);
  }
}

// ---------- Hooks for slides that need post-render setup ----------
const _render=render;
render=function(){
  _render();
  const sl=MODULES[S.mod].slides[S.slide];
  if(sl.type==='channels')showCh('res');
  if(sl.type==='scenario')renderScStep();
};

// Mobile menu
document.getElementById('menubtn').addEventListener('click',()=>document.getElementById('sidenav').classList.toggle('open'));

render();
</script>
</body>
</html>
